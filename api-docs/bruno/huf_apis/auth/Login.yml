info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/method/login"
  body:
    type: json
    data: |-
      {
        "usr":"Administrator",
        "pwd":"{{ADMIN_PASSWORD}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
