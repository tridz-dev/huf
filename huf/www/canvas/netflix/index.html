<div id="canvas-root">
    <header>
        <h1>Calculator</h1>
    </header>
    <main>
        <div class="calculator">
            <input type="text" class="calculator-screen" value="" disabled />
            <div class="calculator-keys">
                <div class="calculator-row">
                    <button type="button" class="operator" value="+">+</button>
                    <button type="button" class="operator" value="-">-</button>
                    <button type="button" class="operator" value="*">&times;</button>
                    <button type="button" class="operator" value="/">&divide;</button>
                </div>
                <div class="calculator-row">
                    <button type="button" value="7">7</button>
                    <button type="button" value="8">8</button>
                    <button type="button" value="9">9</button>
                </div>
                <div class="calculator-row">
                    <button type="button" value="4">4</button>
                    <button type="button" value="5">5</button>
                    <button type="button" value="6">6</button>
                </div>
                <div class="calculator-row">
                    <button type="button" value="1">1</button>
                    <button type="button" value="2">2</button>
                    <button type="button" value="3">3</button>
                </div>
                <div class="calculator-row">
                    <button type="button" value="0">0</button>
                    <button type="button" class="decimal" value=".">.</button>
                    <button type="button" class="all-clear" value="all-clear">AC</button>
                    <button type="button" class="equal-sign operator" value="=">=</button>
                </div>
            </div>
        </div>
    </main>
</div>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.6;
    color: #333;
    background: #f5f5f5;
}

#canvas-root {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.calculator {
    border-radius: 5px;
    box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.1);
    padding: 20px;
    background: white;
}

.calculator-screen {
    width: 100%;
    height: 80px;
    border: none;
    background: #252525;
    color: white;
    font-size: 2rem;
    text-align: right;
    padding-right: 20px;
    padding-left: 10px;
    margin-bottom: 10px;
}

.calculator-keys .operator {
    background-color: #106ba3;
    color: white;
}

.calculator-keys .calculator-row {
    display: flex;
    justify-content: space-between;
}

.calculator-keys button {
    height: 60px;
    width: 60px;
    background: white;
    border: 0.5px solid #ddd;
    font-size: 1.5rem;
    margin: 5px;
}

.equal-sign {
    width: calc(60px * 2 + 10px);
}
</style>

<script>
    function insert(num){
        document.querySelector('.calculator-screen').value = document.querySelector('.calculator-screen').value + num;
    }

    var keys = document.querySelectorAll('.calculator-keys button');
    for(var i = 0; i < keys.length; i++){
        keys[i].onclick = function(e){
            var btnVal = this.value;
            var display = document.querySelector('.calculator-screen');
            if(btnVal == 'all-clear') {
                display.value = '';
            }
            else if(btnVal == '=') {
                if(display.value != ''){
                    display.value = eval(display.value);
                }
            }
            else {
                insert(btnVal);
            }
        }
    }
</script>
