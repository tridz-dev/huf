<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Audio Chat</title>
	<link rel="icon" type="image/x-icon" href="/assets/huf/frontend/assets/favicon-DVOKLumH.ico" />
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		/* Frontend design tokens (radius, scrollbar) */
		:root { --radius: 0.65rem; }
		::-webkit-scrollbar { width: 6px; }
		::-webkit-scrollbar-thumb {
			background-color: rgb(161 161 170 / 0.6);
			border-radius: 999px;
		}
		::-webkit-scrollbar-track { background: transparent; }
		canvas.waveform {
			width: 100%;
			height: 32px;
		}
	</style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans antialiased">
	<div class="min-h-screen flex items-center justify-center p-3 sm:p-4 md:p-6">
		<div class="w-full max-w-3xl bg-white rounded-xl sm:rounded-2xl shadow-lg shadow-zinc-200/50 overflow-hidden flex flex-col h-[85vh] sm:h-[90vh] border border-zinc-200/80">
			<!-- Header -->
			<header class="flex items-center justify-between gap-3 px-4 sm:px-6 md:px-8 py-4 sm:py-5 border-b border-zinc-200 bg-white/80 backdrop-blur-sm shrink-0">
				<div class="flex items-center gap-3 sm:gap-4 min-w-0">
					<a href="/huf" class="shrink-0 flex items-center gap-2" title="Huf">
						<img src="/assets/huf/Images/huf.png" alt="Huf" class="h-8 w-8 sm:h-9 sm:w-9 rounded-lg object-contain" onerror="this.style.display='none'; var s=this.nextElementSibling; if(s){s.classList.remove('hidden'); s.classList.add('flex');}" />
						<span class="hidden h-8 w-8 sm:h-9 sm:w-9 rounded-lg bg-violet-500 text-white items-center justify-center text-xs font-bold shrink-0">H</span>
					</a>
					<div class="min-w-0">
						<h1 id="agent-title" class="text-base sm:text-lg md:text-xl font-semibold text-zinc-900 truncate">
							Audio Agent
						</h1>
						<p class="text-[10px] sm:text-[11px] text-zinc-500 font-medium uppercase tracking-wider">
							Audio Conversation
						</p>
					</div>
				</div>
				<button
					id="reset-button"
					type="button"
					class="shrink-0 p-2 text-zinc-400 hover:text-red-500 hover:bg-red-50 transition-colors rounded-lg"
					title="New conversation"
				>
					<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
						<path d="M3 3v5h5" />
					</svg>
				</button>
			</header>

			<!-- Error toast -->
			<div id="error-toast" class="hidden mx-4 sm:mx-6 md:mx-8 mt-3 sm:mt-4 px-4 py-2.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium flex items-center gap-2 border border-red-100 shrink-0">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
					<circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
				</svg>
				<span id="error-text"></span>
			</div>

			<!-- Chat area -->
			<main id="messages-container" class="flex-1 overflow-y-auto px-4 sm:px-6 md:px-8 py-4 sm:py-6 md:py-8 space-y-6 sm:space-y-8 min-h-0"></main>

			<!-- Loading indicator -->
			<div id="loading-indicator" class="hidden px-4 sm:px-6 md:px-8 pb-2 text-center text-[10px] sm:text-[11px] font-medium text-violet-500 uppercase tracking-widest shrink-0">
				Imagining a response...
			</div>

			<!-- Input area -->
			<footer class="p-4 sm:p-6 md:p-8 bg-white border-t border-zinc-200 shrink-0">
				<form id="chat-form" class="group flex items-center gap-2 p-2 bg-zinc-50 rounded-xl border border-zinc-200 focus-within:border-violet-400 focus-within:ring-2 focus-within:ring-violet-400/20 transition-all duration-200">
					<div id="recording-bar" class="hidden flex flex-1 items-center justify-between gap-3 px-4 sm:px-6 py-3 min-w-0">
						<div class="flex items-center gap-3 sm:gap-4 shrink-0">
							<div class="relative">
								<div class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-red-500 animate-ping absolute"></div>
								<div class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-red-500 relative"></div>
							</div>
							<span id="recording-timer" class="text-sm sm:text-base font-semibold text-red-500 font-mono tabular-nums">0:00</span>
						</div>
						<div class="flex-1 flex justify-center min-w-0 px-2 sm:px-4">
							<canvas id="waveform-canvas" class="waveform max-w-[120px] sm:max-w-[180px]" width="180" height="32"></canvas>
						</div>
						<span class="text-xs sm:text-sm font-medium text-zinc-400 uppercase tracking-wider hidden sm:inline shrink-0">Live</span>
					</div>

					<input
						id="text-input"
						type="text"
						placeholder="Ask your agent..."
						class="flex-1 min-w-0 bg-transparent border-none focus:outline-none focus:ring-0 px-4 sm:px-6 py-2.5 sm:py-3 text-sm text-zinc-900 placeholder-zinc-400"
					/>

					<div class="flex items-center gap-1.5 sm:gap-2 shrink-0">
						<button id="mic-button" type="button" class="p-2.5 sm:p-3 text-zinc-400 hover:text-violet-600 hover:bg-violet-50 transition-colors rounded-lg active:scale-95" title="Record">
							<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
								<path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
								<path d="M7 11a5 5 0 0 0 10 0h-2a3 3 0 0 1-6 0H7Z" />
								<path d="M11 18.95V22h2v-3.05A7.002 7.002 0 0 0 19 12h-2a5 5 0 0 1-10 0H5a7.002 7.002 0 0 0 6 6.95Z" />
							</svg>
						</button>
						<button id="stop-button" type="button" class="hidden p-2.5 sm:p-3 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors active:scale-95" title="Stop">
							<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
								<rect x="6" y="6" width="12" height="12" rx="2" />
							</svg>
						</button>
						<button id="send-button" type="submit" class="p-2.5 sm:p-3 bg-violet-600 hover:bg-violet-700 text-white rounded-lg transition-colors active:scale-95" title="Send">
							<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="m22 2-7 20-4-9-9-4Z" />
								<path d="M22 2 11 13" />
							</svg>
						</button>
					</div>
				</form>
				<p class="text-center mt-3 sm:mt-4 text-[10px] text-zinc-400 font-medium">
					Powered by <a href="/huf" class="text-violet-600 hover:text-violet-700 hover:underline">Huf</a>
				</p>
			</footer>
		</div>
	</div>

	<script>
		if (!window.csrf_token) {
			const cookie = document.cookie.split(";").find(c => c.trim().startsWith("csrf_token="));
			if (cookie) {
				window.csrf_token = decodeURIComponent(cookie.split("=")[1]);
			}
		}

		const qs = new URLSearchParams(window.location.search);
		const agentName = qs.get("agent") || "Audio Agent";
		document.getElementById("agent-title").textContent = agentName;

		const messagesContainer = document.getElementById("messages-container");
		const errorToast = document.getElementById("error-toast");
		const errorText = document.getElementById("error-text");
		const textInput = document.getElementById("text-input");
		const micButton = document.getElementById("mic-button");
		const stopButton = document.getElementById("stop-button");
		const sendButton = document.getElementById("send-button");
		const chatForm = document.getElementById("chat-form");
		const resetButton = document.getElementById("reset-button");

		const recordingBar = document.getElementById("recording-bar");
		const recordingTimerEl = document.getElementById("recording-timer");
		const waveformCanvas = document.getElementById("waveform-canvas");

		let conversationId = null;
		let isRecording = false;
		let recordingSeconds = 0;
		let recordingInterval = null;
		let mediaRecorder = null;
		let audioChunks = [];
		let mediaStream = null;
		let audioContext = null;
		let analyser = null;
		let animationFrame = null;

		const messages = [];
		let isSending = false;
		const seenAgentAudioIds = new Set();

		function showError(msg) {
			errorText.textContent = msg;
			errorToast.classList.remove("hidden");
			setTimeout(() => errorToast.classList.add("hidden"), 4000);
		}

		function formatTime(seconds) {
			if (isNaN(seconds)) return "0:00";
			const mins = Math.floor(seconds / 60);
			const secs = Math.floor(seconds % 60);
			return mins + ":" + (secs < 10 ? "0" : "") + secs;
		}

		function getCsrfToken() {
			if (window.csrf_token) return window.csrf_token;
			const cookie = document.cookie.split(";").find(c => c.trim().startsWith("csrf_token="));
			return cookie ? decodeURIComponent(cookie.split("=")[1]) : "";
		}

		function scrollToBottom() {
			requestAnimationFrame(() => {
				messagesContainer.scrollTop = messagesContainer.scrollHeight;
			});
		}

		function renderMessages() {
			messagesContainer.innerHTML = "";
			messages.forEach(msg => {
				const isAI = msg.role === "assistant";
				const wrapper = document.createElement("div");
				wrapper.className = "flex " + (isAI ? "justify-start" : "justify-end");

				const row = document.createElement("div");
				row.className = "flex max-w-[90%] sm:max-w-[85%] md:max-w-[80%] " + (isAI ? "flex-row" : "flex-row-reverse") + " items-start gap-3 sm:gap-4";

				const avatar = document.createElement("div");
				avatar.className = "flex-shrink-0 w-8 h-8 sm:w-9 sm:h-9 rounded-lg flex items-center justify-center shadow-sm mt-0.5 " + (isAI ? "bg-violet-100 text-violet-600" : "bg-zinc-800 text-white");
				avatar.textContent = isAI ? "AI" : "U";

				const bubbleCol = document.createElement("div");
				bubbleCol.className = "flex flex-col " + (isAI ? "items-start" : "items-end") + " min-w-0";

				const bubble = document.createElement("div");
				bubble.className = "relative px-4 sm:px-5 md:px-6 py-3 sm:py-4 rounded-xl " + (isAI ? "bg-zinc-100 border border-zinc-200 text-zinc-800 rounded-tl-md" : "bg-violet-600 text-white rounded-tr-md shadow-sm");

				if (msg.audioUrl) {
					const player = createAudioPlayer(msg.audioUrl, isAI);
					bubble.appendChild(player);
				}

				bubbleCol.appendChild(bubble);

				const ts = document.createElement("span");
				ts.className = "text-[10px] text-zinc-400 mt-1.5 font-medium px-0.5";
				ts.textContent = msg.timeLabel || "";
				bubbleCol.appendChild(ts);

				row.appendChild(avatar);
				row.appendChild(bubbleCol);
				wrapper.appendChild(row);
				messagesContainer.appendChild(wrapper);
			});
			scrollToBottom();
		}

		function createAudioPlayer(src, isAI) {
			const wrapper = document.createElement("div");
			wrapper.className = "flex items-center gap-3 p-3 rounded-lg w-full max-w-[260px] sm:max-w-[288px] " + (isAI ? "bg-white/80 border border-zinc-200" : "bg-white/10");

			const audio = document.createElement("audio");
			audio.src = src;
			audio.dataset.role = isAI ? "assistant" : "user";

			const btn = document.createElement("button");
			btn.type = "button";
			btn.className = "flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-full transition-all active:scale-90 " + (isAI ? "bg-violet-600 text-white" : "bg-white text-violet-600");

			const playIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m5 3 14 9-14 9V3Z"/></svg>';
			const pauseIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
			btn.innerHTML = playIcon;

			let isPlaying = false;
			let duration = 0;

			const progressBar = document.createElement("div");
			progressBar.className = "h-1 w-full bg-zinc-200 rounded-full overflow-hidden";
			const progressInner = document.createElement("div");
			progressInner.className = "h-full rounded-full transition-all duration-100 " + (isAI ? "bg-violet-600" : "bg-white/80");
			progressInner.style.width = "0%";
			progressBar.appendChild(progressInner);

			const times = document.createElement("div");
			times.className = "flex justify-between text-[10px] font-medium " + (isAI ? "text-zinc-500" : "text-white/80");
			const currentEl = document.createElement("span");
			const totalEl = document.createElement("span");
			currentEl.textContent = "0:00";
			totalEl.textContent = "0:00";
			times.appendChild(currentEl);
			times.appendChild(totalEl);

			btn.addEventListener("click", () => {
				if (isPlaying) audio.pause();
				else audio.play();
			});

			audio.addEventListener("play", () => {
				isPlaying = true;
				btn.innerHTML = pauseIcon;
			});
			audio.addEventListener("pause", () => {
				isPlaying = false;
				btn.innerHTML = playIcon;
			});
			audio.addEventListener("loadedmetadata", () => {
				duration = audio.duration || 0;
				totalEl.textContent = formatTime(duration);
			});
			audio.addEventListener("timeupdate", () => {
				const t = audio.currentTime || 0;
				currentEl.textContent = formatTime(t);
				if (duration > 0) progressInner.style.width = (t / duration) * 100 + "%";
			});
			audio.addEventListener("ended", () => {
				isPlaying = false;
				btn.innerHTML = playIcon;
				progressInner.style.width = "0%";
				currentEl.textContent = "0:00";
			});

			const rightCol = document.createElement("div");
			rightCol.className = "flex-1 flex flex-col justify-center gap-1 min-w-0";
			rightCol.appendChild(progressBar);
			rightCol.appendChild(times);

			wrapper.appendChild(audio);
			wrapper.appendChild(btn);
			wrapper.appendChild(rightCol);
			return wrapper;
		}

		function setLoading(loading) {
			isSending = loading;
			const indicator = document.getElementById("loading-indicator");
			if (indicator) indicator.classList.toggle("hidden", !loading);
			textInput.disabled = loading;
			micButton.disabled = loading;
		}

		function startRecording() {
			if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
				showError("Microphone not supported.");
				return;
			}
			navigator.mediaDevices.getUserMedia({ audio: true })
				.then(stream => {
					mediaStream = stream;
					mediaRecorder = new MediaRecorder(stream);
					audioChunks = [];
					mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
					mediaRecorder.onstop = handleRecordingStop;
					mediaRecorder.start();
					isRecording = true;
					recordingSeconds = 0;
					recordingBar.classList.remove("hidden");
					textInput.classList.add("hidden");
					micButton.classList.add("hidden");
					stopButton.classList.remove("hidden");
					recordingInterval = setInterval(() => {
						recordingSeconds += 1;
						recordingTimerEl.textContent = formatTime(recordingSeconds);
					}, 1000);
					startWaveform(stream);
				})
				.catch(() => showError("Please enable microphone access."));
		}

		function stopRecording() {
			if (!isRecording || !mediaRecorder) return;
			mediaRecorder.stop();
			if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
			isRecording = false;
			clearInterval(recordingInterval);
			recordingTimerEl.textContent = "0:00";
			recordingBar.classList.add("hidden");
			textInput.classList.remove("hidden");
			micButton.classList.remove("hidden");
			stopButton.classList.add("hidden");
			stopWaveform();
		}

		function startWaveform(stream) {
			if (!waveformCanvas) return;
			const ctx = waveformCanvas.getContext("2d");
			audioContext = new (window.AudioContext || window.webkitAudioContext)();
			const source = audioContext.createMediaStreamSource(stream);
			analyser = audioContext.createAnalyser();
			analyser.fftSize = 64;
			source.connect(analyser);

			const bufferLength = analyser.frequencyBinCount;
			const dataArray = new Uint8Array(bufferLength);

			const draw = () => {
				if (!analyser) return;
				analyser.getByteFrequencyData(dataArray);
				const w = waveformCanvas.width, h = waveformCanvas.height;
				ctx.clearRect(0, 0, w, h);
				const barWidth = 3, gutter = 2, total = barWidth + gutter;
				const numBars = Math.floor(w / total);
				ctx.fillStyle = "#ef4444";
				for (let i = 0; i < numBars; i++) {
					const val = dataArray[i % bufferLength];
					const barHeight = Math.max(4, h * (val / 255));
					ctx.fillRect(i * total, (h - barHeight) / 2, barWidth, barHeight);
				}
				animationFrame = requestAnimationFrame(draw);
			};
			draw();
		}

		function stopWaveform() {
			if (animationFrame) cancelAnimationFrame(animationFrame);
			if (audioContext) audioContext.close();
			audioContext = null;
			analyser = null;
		}

		function handleRecordingStop() {
			const blob = new Blob(audioChunks, { type: "audio/webm" });
			if (blob.size > 0) sendAudioMessage(blob);
		}

		async function callMethod(method, args) {
			const res = await fetch("/api/method/" + method, {
				method: "POST",
				headers: { "Content-Type": "application/json", "X-Frappe-CSRF-Token": getCsrfToken() },
				body: JSON.stringify(args || {}),
			});
			if (!res.ok) throw new Error((await res.text()) || "Request failed");
			return (await res.json()).message;
		}

		async function ensureConversation() {
			if (conversationId) return conversationId;
			const payload = await callMethod("huf.ai.agent_chat.create_conversation", { agent: agentName, channel: "Chat" });
			conversationId = payload.conversation_id;
			return conversationId;
		}

		async function refreshHistory() {
			if (!conversationId) return;
			try {
				const params = new URLSearchParams({
					fields: JSON.stringify(["name", "conversation", "role", "kind", "is_agent_message", "generated_audio", "voice_message", "creation"]),
					filters: JSON.stringify([["Agent Message", "conversation", "=", conversationId], ["Agent Message", "kind", "=", "Audio"], ["Agent Message", "is_agent_message", "=", 1]]),
					order_by: "creation desc",
					limit_page_length: "5",
				});
				const res = await fetch(`/api/resource/Agent%20Message?${params}`, {
					method: "GET",
					headers: { "X-Frappe-CSRF-Token": getCsrfToken() },
				});
				if (!res.ok) throw new Error("Failed to load history");
				const data = await res.json();
				const docs = Array.isArray(data.data) ? data.data : [];
				docs.slice().reverse().forEach(m => {
					if (seenAgentAudioIds.has(m.name)) return;
					const audioUrl = m.voice_message || m.generated_audio || null;
					if (!audioUrl) return;
					seenAgentAudioIds.add(m.name);
					messages.push({
						role: "assistant",
						audioUrl,
						timeLabel: new Date(m.creation).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
					});
				});
				renderMessages();
				const players = messagesContainer.querySelectorAll('audio[data-role="assistant"]');
				const last = players[players.length - 1];
				if (last) last.play().catch(() => {});
			} catch (e) {
				showError("Failed to load history");
			}
		}

		async function sendAudioMessage(blob) {
			try {
				setLoading(true);
				messages.push({
					role: "user",
					audioUrl: URL.createObjectURL(blob),
					timeLabel: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
				});
				renderMessages();

				const convId = await ensureConversation();
				const reader = new FileReader();
				reader.onload = async function (evt) {
					try {
						const dataUrl = evt.target?.result;
						if (!dataUrl || typeof dataUrl !== "string") throw new Error("Failed to read audio");
						const result = await callMethod("huf.ai.agent_chat.upload_audio_and_transcribe_web", {
							filename: "recording_" + Date.now() + ".webm",
							b64data: dataUrl,
							agent: agentName,
							conversation: convId,
						});
						if (!result?.success) throw new Error(result?.error || "Transcription failed");
						if (!conversationId && result.conversation_id) conversationId = result.conversation_id;
						setTimeout(refreshHistory, 2000);
					} catch (e) {
						showError("Failed to send audio");
					} finally {
						setLoading(false);
					}
				};
				reader.readAsDataURL(blob);
			} catch (e) {
				showError("Failed to send audio");
				setLoading(false);
			}
		}

		async function sendTextMessage(text) {
			if (!text.trim()) return;
			try {
				setLoading(true);
				const convId = await ensureConversation();
				await callMethod("huf.ai.agent_chat.send_message_to_conversation", { conversation: convId, message: text });
				textInput.value = "";
				setTimeout(refreshHistory, 2000);
			} catch (e) {
				showError("Failed to send message");
			} finally {
				setLoading(false);
			}
		}

		micButton.addEventListener("click", () => { if (!isRecording) startRecording(); });
		stopButton.addEventListener("click", stopRecording);
		chatForm.addEventListener("submit", e => {
			e.preventDefault();
			if (isRecording) { stopRecording(); return; }
			sendTextMessage(textInput.value);
		});
		resetButton.addEventListener("click", () => {
			conversationId = null;
			messages.length = 0;
			renderMessages();
		});
	</script>
</body>
</html>
