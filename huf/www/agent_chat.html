<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Audio Chat</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		::-webkit-scrollbar {
			width: 6px;
		}
		::-webkit-scrollbar-thumb {
			background-color: rgba(148, 163, 184, 0.7);
			border-radius: 999px;
		}
		canvas.waveform {
			width: 100%;
			height: 32px;
		}
	</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-violet-50 font-sans antialiased">
	<div class="min-h-screen flex items-center justify-center p-4">
		<div
			class="w-full max-w-3xl bg-white/70 backdrop-blur-2xl rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden flex flex-col h-[90vh] border border-white/50"
		>
			<!-- Header -->
			<header
				class="flex items-center justify-between px-8 py-5 border-b border-indigo-50/60"
			>
				<div class="flex items-center">
					<div class="relative mr-4">
						<div
							class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-200 rotate-3 transition-transform cursor-pointer text-white text-xl font-bold"
						>
							AI
						</div>
						<div
							class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-4 border-white rounded-full"
						></div>
					</div>
					<div>
						<h1
							id="agent-title"
							class="text-xl font-bold text-zinc-900 tracking-tight"
						>
							Audio Agent
						</h1>
						<p
							class="text-[11px] text-zinc-400 font-bold uppercase tracking-widest"
						>
							Audio Conversation
						</p>
					</div>
				</div>
				<div class="flex gap-2">
					<button
						id="reset-button"
						class="p-2 text-zinc-400 hover:text-red-500 transition-colors rounded-xl hover:bg-red-50"
						type="button"
					>
						<span class="text-lg font-semibold">&times;</span>
					</button>
				</div>
			</header>

			<!-- Error toast -->
			<div
				id="error-toast"
				class="hidden mx-auto mt-4 px-4 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-bold flex items-center gap-2 border border-red-100"
			>
				<span id="error-text"></span>
			</div>

			<!-- Chat area -->
			<main
				id="messages-container"
				class="flex-1 overflow-y-auto px-8 py-8 space-y-10"
			></main>

			<!-- Loading indicator -->
			<div
				id="loading-indicator"
				class="hidden px-8 pb-2 text-center text-[11px] font-semibold text-indigo-400 uppercase tracking-[0.2em]"
			>
				Imagining a response...
			</div>

			<!-- Input area -->
			<footer class="p-8 bg-transparent">
				<form
					id="chat-form"
					class="group relative flex items-center gap-2 p-2 bg-white rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.03)] border border-indigo-100 focus-within:border-indigo-400 focus-within:ring-4 focus-within:ring-indigo-400/5 transition-all duration-300"
				>
					<div id="recording-bar" class="hidden flex-1 items-center justify-between px-6 py-3">
						<div class="flex items-center gap-4">
							<div class="relative">
								<div
									class="w-3 h-3 rounded-full bg-red-500 animate-ping absolute"
								></div>
								<div
									class="w-3 h-3 rounded-full bg-red-500 relative"
								></div>
							</div>
							<span
								id="recording-timer"
								class="text-base font-bold text-red-500 font-mono tracking-wider"
							>0:00</span>
						</div>
						<div class="flex-1 flex justify-center px-4">
							<canvas
								id="waveform-canvas"
								class="waveform max-w-[200px]"
								width="180"
								height="32"
							></canvas>
						</div>
						<span
							class="text-sm font-bold text-zinc-400 uppercase tracking-widest hidden sm:inline"
						>Live Audio</span>
					</div>

					<input
						id="text-input"
						type="text"
						placeholder="Ask your agent..."
						class="flex-1 bg-transparent border-none focus:outline-none px-6 py-3 text-sm text-zinc-900 placeholder-zinc-400 font-medium"
					/>

					<div class="flex items-center gap-2 pr-1">
						<button
							id="mic-button"
							type="button"
							class="p-3.5 text-zinc-400 hover:text-indigo-600 transition-all rounded-2xl hover:bg-indigo-50 active:scale-90"
						>
							<svg
								xmlns="http://www.w3.org/2000/svg"
								viewBox="0 0 24 24"
								class="w-4 h-4"
								fill="currentColor"
							>
								<path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
								<path d="M7 11a5 5 0 0 0 10 0h-2a3 3 0 0 1-6 0H7Z" />
								<path d="M11 18.95V22h2v-3.05A7.002 7.002 0 0 0 19 12h-2a5 5 0 0 1-10 0H5a7.002 7.002 0 0 0 6 6.95Z" />
							</svg>
						</button>
						<button
							id="stop-button"
							type="button"
							class="hidden p-3.5 bg-red-500 hover:bg-red-600 text-white transition-all rounded-2xl shadow-lg shadow-red-200 active:scale-95"
						>
							<span class="text-base font-semibold">&#9632;</span>
						</button>
						<button
							id="send-button"
							type="submit"
							class="p-3.5 bg-indigo-600 hover:bg-indigo-700 text-white transition-all rounded-2xl shadow-lg shadow-indigo-200 hover:scale-105 active:scale-95"
						>
							<span class="text-sm font-semibold">&#10148;</span>
						</button>
					</div>
				</form>
				<p
					class="text-center mt-4 text-[10px] font-bold text-zinc-300 uppercase tracking-widest"
				>
					Audio-only session powered by Huf
				</p>
			</footer>
		</div>
	</div>

	<script>
		// CSRF token provided from Frappe/Jinja (aligned with huf.html)
		if (!window.csrf_token) {
			// Fallback: try to read from cookies if not injected
			const cookie = document.cookie.split(";").find(c => c.trim().startsWith("csrf_token="));
			if (cookie) {
				window.csrf_token = decodeURIComponent(cookie.split("=")[1]);
			}
		}

		const qs = new URLSearchParams(window.location.search);
		const agentName = qs.get("agent") || "Audio Agent";
		document.getElementById("agent-title").textContent = agentName;

		const messagesContainer = document.getElementById("messages-container");
		const errorToast = document.getElementById("error-toast");
		const errorText = document.getElementById("error-text");
		const textInput = document.getElementById("text-input");
		const micButton = document.getElementById("mic-button");
		const stopButton = document.getElementById("stop-button");
		const sendButton = document.getElementById("send-button");
		const chatForm = document.getElementById("chat-form");
		const resetButton = document.getElementById("reset-button");

		const recordingBar = document.getElementById("recording-bar");
		const recordingTimerEl = document.getElementById("recording-timer");
		const waveformCanvas = document.getElementById("waveform-canvas");

		let conversationId = null;
		let isRecording = false;
		let recordingSeconds = 0;
		let recordingInterval = null;
		let mediaRecorder = null;
		let audioChunks = [];
		let mediaStream = null;
		let audioContext = null;
		let analyser = null;
		let animationFrame = null;

		const messages = [];
		let isSending = false;
		const seenAgentAudioIds = new Set();

		function showError(msg) {
			errorText.textContent = msg;
			errorToast.classList.remove("hidden");
			setTimeout(() => {
				errorToast.classList.add("hidden");
			}, 4000);
		}

		function formatTime(seconds) {
			if (isNaN(seconds)) return "0:00";
			const mins = Math.floor(seconds / 60);
			const secs = Math.floor(seconds % 60);
			return mins + ":" + (secs < 10 ? "0" : "") + secs;
		}

		function getCsrfToken() {
			if (window.csrf_token) return window.csrf_token;
			const cookie = document.cookie.split(";").find(c => c.trim().startsWith("csrf_token="));
			if (!cookie) return "";
			return decodeURIComponent(cookie.split("=")[1]);
		}

		function scrollToBottom() {
			requestAnimationFrame(() => {
				messagesContainer.scrollTop = messagesContainer.scrollHeight;
			});
		}

		function renderMessages() {
			messagesContainer.innerHTML = "";
			messages.forEach(msg => {
				const isAI = msg.role === "assistant";
				const wrapper = document.createElement("div");
				wrapper.className = "flex " + (isAI ? "justify-start" : "justify-end");

				const row = document.createElement("div");
				row.className =
					"flex max-w-[80%] " +
					(isAI ? "flex-row" : "flex-row-reverse") +
					" items-start gap-4";

				const avatar = document.createElement("div");
				avatar.className =
					"flex-shrink-0 w-9 h-9 rounded-2xl flex items-center justify-center shadow-sm mt-1 " +
					(isAI
						? "bg-indigo-50 text-indigo-600"
						: "bg-zinc-900 text-white");
				avatar.textContent = isAI ? "AI" : "U";

				const bubbleCol = document.createElement("div");
				bubbleCol.className = "flex flex-col " + (isAI ? "items-start" : "items-end");

				const bubble = document.createElement("div");
				bubble.className =
					"relative px-6 py-4 rounded-[2rem] " +
					(isAI
						? "bg-white border border-indigo-50 text-zinc-800 rounded-tl-none"
						: "bg-gradient-to-tr from-indigo-600 to-violet-600 text-white rounded-tr-none shadow-md shadow-indigo-100");

				if (msg.audioUrl) {
					const player = createAudioPlayer(msg.audioUrl, isAI);
					bubble.appendChild(player);
				}

				bubbleCol.appendChild(bubble);

				const ts = document.createElement("span");
				ts.className =
					"text-[10px] text-zinc-400 mt-2 font-bold tracking-tighter px-1 uppercase";
				ts.textContent = msg.timeLabel || "";
				bubbleCol.appendChild(ts);

				row.appendChild(avatar);
				row.appendChild(bubbleCol);
				wrapper.appendChild(row);
				messagesContainer.appendChild(wrapper);
			});
			scrollToBottom();
		}

		function createAudioPlayer(src, isAI) {
			const wrapper = document.createElement("div");
			wrapper.className =
				"flex items-center gap-3 p-3 rounded-2xl mt-3 w-72 shadow-sm border backdrop-blur-sm " +
				(isAI
					? "bg-white/60 border-indigo-100"
					: "bg-indigo-500/10 border-transparent");

			const audio = document.createElement("audio");
			audio.src = src;
			audio.dataset.role = isAI ? "assistant" : "user";

			const btn = document.createElement("button");
			btn.type = "button";
			btn.className =
				"flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-full transition-all active:scale-90 " +
				(isAI
					? "bg-indigo-600 text-white shadow-md shadow-indigo-200"
					: "bg-white text-indigo-600 shadow-sm");
			btn.textContent = "▶";

			let isPlaying = false;
			let duration = 0;

			const progressBar = document.createElement("div");
			progressBar.className =
				"h-1 w-full bg-indigo-100 rounded-full overflow-hidden";
			const progressInner = document.createElement("div");
			progressInner.className =
				"h-full rounded-full transition-all duration-100 " +
				(isAI ? "bg-indigo-600" : "bg-indigo-400");
			progressInner.style.width = "0%";
			progressBar.appendChild(progressInner);

			const times = document.createElement("div");
			times.className =
				"flex justify-between text-[10px] font-bold tracking-wider uppercase " +
				(isAI ? "text-indigo-400" : "text-indigo-300");
			const currentEl = document.createElement("span");
			const totalEl = document.createElement("span");
			currentEl.textContent = "0:00";
			totalEl.textContent = "0:00";
			times.appendChild(currentEl);
			times.appendChild(totalEl);

			btn.addEventListener("click", () => {
				if (isPlaying) {
					audio.pause();
				} else {
					audio.play();
				}
			});

			audio.addEventListener("play", () => {
				isPlaying = true;
				btn.textContent = "⏸";
			});
			audio.addEventListener("pause", () => {
				isPlaying = false;
				btn.textContent = "▶";
			});
			audio.addEventListener("loadedmetadata", () => {
				duration = audio.duration || 0;
				totalEl.textContent = formatTime(duration);
			});
			audio.addEventListener("timeupdate", () => {
				const t = audio.currentTime || 0;
				currentEl.textContent = formatTime(t);
				if (duration > 0) {
					progressInner.style.width = (t / duration) * 100 + "%";
				}
			});
			audio.addEventListener("ended", () => {
				isPlaying = false;
				btn.textContent = "▶";
				progressInner.style.width = "0%";
				currentEl.textContent = "0:00";
			});

			const rightCol = document.createElement("div");
			rightCol.className = "flex-1 flex flex-col justify-center gap-1.5";
			rightCol.appendChild(progressBar);
			rightCol.appendChild(times);

			wrapper.appendChild(audio);
			wrapper.appendChild(btn);
			wrapper.appendChild(rightCol);
			return wrapper;
		}

		function setLoading(loading) {
			isSending = loading;
			const indicator = document.getElementById("loading-indicator");
			if (indicator) {
				indicator.classList.toggle("hidden", !loading);
			}
			// Avoid starting new actions while sending
			textInput.disabled = loading;
			micButton.disabled = loading;
		}

		function startRecording() {
			if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
				showError("Microphone not supported in this browser.");
				return;
			}
			navigator.mediaDevices
				.getUserMedia({ audio: true })
				.then(stream => {
					mediaStream = stream;
					mediaRecorder = new MediaRecorder(stream);
					audioChunks = [];
					mediaRecorder.ondataavailable = e => {
						if (e.data.size > 0) audioChunks.push(e.data);
					};
					mediaRecorder.onstop = handleRecordingStop;
					mediaRecorder.start();
					isRecording = true;
					recordingSeconds = 0;
					recordingBar.classList.remove("hidden");
					textInput.classList.add("hidden");
					micButton.classList.add("hidden");
					stopButton.classList.remove("hidden");
					recordingInterval = setInterval(() => {
						recordingSeconds += 1;
						recordingTimerEl.textContent = formatTime(recordingSeconds);
					}, 1000);
					startWaveform(stream);
				})
				.catch(() => {
					showError("Please enable microphone access.");
				});
		}

		function stopRecording() {
			if (!isRecording || !mediaRecorder) return;
			mediaRecorder.stop();
			if (mediaStream) {
				mediaStream.getTracks().forEach(t => t.stop());
			}
			isRecording = false;
			clearInterval(recordingInterval);
			recordingTimerEl.textContent = "0:00";
			recordingBar.classList.add("hidden");
			textInput.classList.remove("hidden");
			micButton.classList.remove("hidden");
			stopButton.classList.add("hidden");
			stopWaveform();
		}

		function startWaveform(stream) {
			if (!waveformCanvas) return;
			const ctx = waveformCanvas.getContext("2d");
			audioContext =
				new (window.AudioContext || window.webkitAudioContext)();
			const source = audioContext.createMediaStreamSource(stream);
			analyser = audioContext.createAnalyser();
			analyser.fftSize = 64;
			source.connect(analyser);

			const bufferLength = analyser.frequencyBinCount;
			const dataArray = new Uint8Array(bufferLength);

			const draw = () => {
				if (!analyser) return;
				analyser.getByteFrequencyData(dataArray);
				const width = waveformCanvas.width;
				const height = waveformCanvas.height;
				ctx.clearRect(0, 0, width, height);
				const barWidth = 3;
				const gutter = 2;
				const totalBarWidth = barWidth + gutter;
				const numBars = Math.floor(width / totalBarWidth);
				ctx.fillStyle = "#ef4444";
				for (let i = 0; i < numBars; i++) {
					const val = dataArray[i % bufferLength];
					const percent = val / 255;
					const barHeight = Math.max(4, height * percent);
					const x = i * totalBarWidth;
					const y = (height - barHeight) / 2;
					ctx.fillRect(x, y, barWidth, barHeight);
				}
				animationFrame = requestAnimationFrame(draw);
			};
			draw();
		}

		function stopWaveform() {
			if (animationFrame) cancelAnimationFrame(animationFrame);
			if (audioContext) audioContext.close();
			audioContext = null;
			analyser = null;
		}

		function handleRecordingStop() {
			const blob = new Blob(audioChunks, { type: "audio/webm" });
			if (blob.size === 0) return;
			sendAudioMessage(blob);
		}

		async function callMethod(method, args) {
			const res = await fetch("/api/method/" + method, {
				method: "POST",
				headers: {
					"Content-Type": "application/json",
					"X-Frappe-CSRF-Token": getCsrfToken(),
				},
				body: JSON.stringify(args || {}),
			});
			if (!res.ok) {
				const text = await res.text();
				throw new Error(text || "Request failed");
			}
			const data = await res.json();
			return data.message;
		}

		async function ensureConversation() {
			if (conversationId) return conversationId;
			const payload = await callMethod("huf.ai.agent_chat.create_conversation", {
				agent: agentName,
				channel: "Chat",
			});
			conversationId = payload.conversation_id;
			return conversationId;
		}

		async function refreshHistory() {
			if (!conversationId) return;
			try {
				const params = new URLSearchParams({
					fields: JSON.stringify([
						"name",
						"conversation",
						"role",
						"kind",
						"is_agent_message",
						"generated_audio",
						"voice_message",
						"creation",
					]),
					filters: JSON.stringify([
						["Agent Message", "conversation", "=", conversationId],
						["Agent Message", "kind", "=", "Audio"],
						["Agent Message", "is_agent_message", "=", 1],
					]),
					order_by: "creation desc",
					limit_page_length: "5",
				});

				const res = await fetch(
					`/api/resource/Agent%20Message?${params.toString()}`,
					{
						method: "GET",
						headers: {
							"X-Frappe-CSRF-Token": getCsrfToken(),
						},
					}
				);

				if (!res.ok) {
					throw new Error("Failed to load Agent Message history");
				}

				const data = await res.json();
				const docs = Array.isArray(data.data) ? data.data : [];

				docs
					.slice()
					.reverse()
					.forEach(m => {
						// Only append agent audio messages we haven't rendered yet
						if (seenAgentAudioIds.has(m.name)) {
							return;
						}

						const audioUrl =
							m.voice_message ||
							m.generated_audio ||
							null;

						if (!audioUrl) {
							return;
						}

						seenAgentAudioIds.add(m.name);

						const ts = new Date(m.creation);
						messages.push({
							role: "assistant",
							audioUrl,
							timeLabel: ts.toLocaleTimeString([], {
								hour: "2-digit",
								minute: "2-digit",
							}),
						});
					});

				renderMessages();

				// Auto-play the latest assistant audio using the actual player element
				const assistantPlayers = messagesContainer.querySelectorAll(
					'audio[data-role="assistant"]'
				);
				const lastPlayer =
					assistantPlayers[assistantPlayers.length - 1];
				if (lastPlayer) {
					lastPlayer.play().catch(() => {});
				}
			} catch (e) {
				showError("Failed to load history");
			}
		}

		async function sendAudioMessage(blob) {
			try {
				setLoading(true);
				const ts = new Date();
				messages.push({
					role: "user",
					audioUrl: URL.createObjectURL(blob),
					timeLabel: ts.toLocaleTimeString([], {
						hour: "2-digit",
						minute: "2-digit",
					}),
				});
				renderMessages();

				const convId = await ensureConversation();

				const reader = new FileReader();
				reader.onload = async function (evt) {
					try {
						const dataUrl = evt.target && typeof evt.target.result === "string" ? evt.target.result : null;
						if (!dataUrl) {
							throw new Error("Failed to read audio data");
						}

						const filename = `recording_${Date.now()}.webm`;

						const result = await callMethod("huf.ai.agent_chat.upload_audio_and_transcribe_web", {
							filename,
							b64data: dataUrl,
							agent: agentName,
							conversation: convId,
						});

						if (!result || !result.success) {
							throw new Error(result?.error || "Transcription or agent run failed");
						}

						if (!conversationId && result.conversation_id) {
							conversationId = result.conversation_id;
						}

						// Small delay so Agent Message is fully committed before we fetch
						setTimeout(() => {
							refreshHistory();
						}, 2000);
					} catch (e) {
						showError("Failed to send audio message");
					} finally {
						setLoading(false);
					}
				};
				reader.readAsDataURL(blob);
			} catch (e) {
				showError("Failed to send audio message");
				setLoading(false);
			}
		}

		async function sendTextMessage(text) {
			if (!text.trim()) return;
			try {
				setLoading(true);
				const convId = await ensureConversation();
				await callMethod(
					"huf.ai.agent_chat.send_message_to_conversation",
					{
						conversation: convId,
						message: text,
					}
				);
				textInput.value = "";
				// Small delay so Agent Message is fully committed before we fetch
				setTimeout(() => {
					refreshHistory();
				}, 2000);
			} catch (e) {
				showError("Failed to send message");
			} finally {
				setLoading(false);
			}
		}

		micButton.addEventListener("click", () => {
			if (!isRecording) startRecording();
		});
		stopButton.addEventListener("click", () => {
			stopRecording();
		});

		chatForm.addEventListener("submit", e => {
			e.preventDefault();
			// If recording, treat Send as stop+send-audio-now
			if (isRecording) {
				stopRecording();
				return;
			}
			const text = textInput.value;
			sendTextMessage(text);
		});

		resetButton.addEventListener("click", () => {
			conversationId = null;
			messages.length = 0;
			renderMessages();
		});
	</script>
</body>
</html>
