<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huf CoPilot (beta)</title>
    <script>
        // Set CSRF token from Frappe session
        window.csrf_token = '{{ frappe.session.csrf_token }}';
    </script>
</head>
<body>
   <div class="canvas-editor">
    
        <!-- Header -->
        <header class="canvas-header">
            <div class="canvas-title">
                <h1 id="canvas-title">Huf CoPilot (beta)</h1>
                <span id="canvas-slug" class="canvas-slug"></span>
            </div>
            <div class="canvas-actions">
                <button id="btn-save" class="btn btn-primary" style="display:none;">Save</button>
                <button id="btn-reset" class="btn btn-secondary">Reset to Starter</button>
            </div>
        </header>

        <!-- Main Container -->
        <div class="canvas-container">
            <!-- Left Sidebar: Chat -->
            <aside class="canvas-sidebar" id="chat-sidebar">
                <div class="sidebar-header">
                    <h2>Agent Chat</h2>
                    <div class="agent-info">
                        <span id="agent-name">Loading...</span>
                    </div>
                </div>
                
                <div class="chat-messages" id="chat-messages">
                    <div class="message system">
                        <p>Canvas editor loaded. Start chatting with your agent to edit this canvas.</p>
                    </div>
                </div>
                
                <div class="chat-input">
                    <textarea 
                        id="prompt-input" 
                        placeholder="Describe what you want to change..."
                        rows="3"
                    ></textarea>
                    <button id="btn-send" class="btn btn-primary">Send</button>
                </div>
            </aside>

            <!-- Right: Preview -->
            <main class="canvas-preview">
                <div class="preview-header">
                    <h3>Live Preview</h3>
                    <button id="btn-refresh" class="btn btn-sm">Refresh</button>
                </div>
                <iframe 
                    id="preview-frame" 
                    title="Canvas Preview"
                    sandbox="allow-scripts"
                ></iframe>
            </main>
        </div>
    </div>
    
<style>
    :root {
    --primary-color: #2c3e50;
    --secondary-color: #3498db;
    --bg-color: #f5f7fa;
    --sidebar-width: 400px;
    --header-height: 60px;
    --border-color: #e1e8ed;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-color);
    overflow: hidden;
}

/* Header */
.canvas-header {
    height: var(--header-height);
    background: white;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 1.5rem;
}

.canvas-title h1 {
    font-size: 1.25rem;
    color: var(--primary-color);
    margin: 0;
}

.canvas-slug {
    font-size: 0.875rem;
    color: #6c757d;
    margin-left: 0.5rem;
}

.canvas-actions {
    display: flex;
    gap: 0.5rem;
}

/* Main Container */
.canvas-container {
    display: flex;
    height: calc(100vh - var(--header-height));
}

/* Sidebar */
.canvas-sidebar {
    width: var(--sidebar-width);
    background: white;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border-color);
}

.sidebar-header h2 {
    font-size: 1rem;
    margin-bottom: 0.5rem;
}

.agent-info {
    font-size: 0.875rem;
    color: #6c757d;
}

/* Chat Messages */
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.message {
    padding: 0.75rem;
    border-radius: 8px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.message.user {
    background: #e3f2fd;
    align-self: flex-end;
    max-width: 80%;
}

.message.agent {
    background: #f5f5f5;
    align-self: flex-start;
    max-width: 80%;
}

.message.system {
    background: #fff3cd;
    text-align: center;
    font-size: 0.875rem;
}

.message.error {
    background: #f8d7da;
    color: #721c24;
}

/* Chat Input */
.chat-input {
    padding: 1rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.chat-input textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.875rem;
    resize: none;
}

.chat-input textarea:focus {
    outline: none;
    border-color: var(--secondary-color);
}

/* Preview */
.canvas-preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: white;
}

.preview-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.preview-header h3 {
    font-size: 1rem;
    margin: 0;
}

#preview-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: white;
}

/* Buttons */
.btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 6px;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-primary {
    background: var(--secondary-color);
    color: white;
}

.btn-primary:hover {
    background: #2980b9;
}

.btn-secondary {
    background: #6c757d;
    color: white;
}

.btn-secondary:hover {
    background: #5a6268;
}

.btn-sm {
    padding: 0.375rem 0.75rem;
    font-size: 0.8125rem;
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Loading State */
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #6c757d;
}

/* Responsive */
@media (max-width: 768px) {
    .canvas-container {
        flex-direction: column;
    }
    
    .canvas-sidebar {
        width: 100%;
        height: 50%;
    }
    
    .canvas-preview {
        height: 50%;
    }
}
</style>

<script>
    // Canvas Editor JavaScript
(function() {
    'use strict';

    // State
    let canvasSlug = null;
    let canvasData = null;
    let agentData = null;

    // DOM Elements
    const elements = {
        canvasTitle: document.getElementById('canvas-title'),
        canvasSlug: document.getElementById('canvas-slug'),
        agentName: document.getElementById('agent-name'),
        chatMessages: document.getElementById('chat-messages'),
        promptInput: document.getElementById('prompt-input'),
        btnSend: document.getElementById('btn-send'),
        btnRefresh: document.getElementById('btn-refresh'),
        btnReset: document.getElementById('btn-reset'),
        previewFrame: document.getElementById('preview-frame')
    };

    // Initialize
    async function init() {
        // Extract slug from URL
        const path = window.location.pathname;
        const matches = path.match(/\/canvas\/edit\/([^\/]+)/);
        
        if (!matches) {
            showError('Invalid canvas URL');
            return;
        }

        canvasSlug = matches[1];
        // Don't show slug in UI - keep title clean
        // elements.canvasSlug.textContent = `(${canvasSlug})`;

        // Load canvas metadata
        await loadCanvasMetadata();

        // Set up preview iframe
        loadPreview();

        // Set up event listeners
        setupEventListeners();

        // Show ready message
        addSystemMessage('Canvas editor ready. Type a message to start editing.');
    }

    // Helper to get CSRF token
    function getCSRFToken() {
        return window.csrf_token || '';
    }

    // Helper function to make API calls using fetch
    async function callFrappeMethod(method, args = {}) {
        const csrfToken = getCSRFToken();
        
        if (!csrfToken) {
            throw new Error('CSRF token not available');
        }
        
        const response = await fetch('/api/method/' + method, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Frappe-CSRF-Token': csrfToken
            },
            credentials: 'include',
            body: JSON.stringify(args)
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            let errorMessage = `API call failed: ${response.status} ${response.statusText}`;
            try {
                const errorData = JSON.parse(errorText);
                errorMessage = errorData.message || errorData.exc || errorMessage;
            } catch (e) {
                errorMessage += ` - ${errorText.substring(0, 100)}`;
            }
            throw new Error(errorMessage);
        }
        
        const data = await response.json();
        return { message: data };
    }

    // Load canvas metadata from backend
    async function loadCanvasMetadata() {
        try {
            const response = await callFrappeMethod('huf.ai.canvas_api.get_canvas_metadata', { slug: canvasSlug });
            
            console.log('Canvas metadata response:', response);

            // Frappe wraps response in .message
            const data = response.message.message || response.message;
            
            if (!data || !data.success) {
                throw new Error(data?.error || 'Unknown error loading canvas metadata');
            }

            canvasData = data.canvas;
            agentData = data.agent;

            // Keep static "Huf CoPilot (beta)" title
            // elements.canvasTitle.textContent = canvasData.title;
            
            // Check if agent is assigned in canvas data
            if (canvasData.agent) {
                elements.agentName.textContent = agentData?.name || canvasData.agent;
                // Enable send button even if agent details not found, as long as agent name exists
                elements.btnSend.disabled = false;
            } else {
                elements.agentName.textContent = 'No agent assigned';
                addSystemMessage('⚠️ No agent assigned to this canvas. Assign an agent to enable editing.');
                elements.btnSend.disabled = true;
            }

        } catch (error) {
            console.error('Failed to load canvas metadata:', error);
            showError('Failed to load canvas metadata: ' + error.message);
        }
    }

    // Load preview in iframe
    function loadPreview() {
        const previewUrl = `/canvas/${canvasSlug}?t=${Date.now()}`;
        elements.previewFrame.src = previewUrl;
    }

    // Setup event listeners
    function setupEventListeners() {
        // Send message
        elements.btnSend.addEventListener('click', sendMessage);
        elements.promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault(); // Prevent newline
                sendMessage();
            }
        });

        // Refresh preview
        elements.btnRefresh.addEventListener('click', loadPreview);

        // Reset canvas
        elements.btnReset.addEventListener('click', resetCanvas);
    }

    // Send message to agent
    async function sendMessage() {
        const prompt = elements.promptInput.value.trim();
        if (!prompt) return;

        // Check if agent is assigned
        if (!agentData) {
            addErrorMessage('No agent assigned to this canvas. Please assign an agent first.');
            return;
        }

        // Add user message to chat
        addUserMessage(prompt);
        elements.promptInput.value = '';
        elements.btnSend.disabled = true;

        // Show loading indicator
        const loadingMessageElement = addSystemMessage('Sending message to agent...');

        try {
            const response = await callFrappeMethod('huf.ai.canvas_api.send_canvas_message', {
                slug: canvasSlug,
                message: prompt
            });

            // Remove loading message
            if (loadingMessageElement) {
                loadingMessageElement.remove();
            }

            // Frappe wraps response in .message
            const data = response.message.message || response.message;
            
            if (!data || !data.success) {
                throw new Error(data?.error || 'Unknown error sending message');
            }

            // Add agent response
            const agentResponse = data.response || 'Task completed';
            addAgentMessage(agentResponse);

            // Refresh preview after agent response
            setTimeout(() => {
                loadPreview();
            }, 500);

        } catch (error) {
            console.error('Failed to send message:', error);
            addErrorMessage('Failed to communicate with agent: ' + (error.message || error));
        } finally {
            elements.btnSend.disabled = false;
            elements.promptInput.focus();
        }
    }

    // Reset canvas to starter template
    async function resetCanvas() {
        if (!confirm('Reset this canvas to the starter template? This will delete all changes.')) {
            return;
        }

        try {
            // TODO: Implement actual API call
            addSystemMessage('Canvas reset to starter template');
            loadPreview();
        } catch (error) {
            console.error('Failed to reset canvas:', error);
            showError('Failed to reset canvas');
        }
    }

    // Add messages to chat
    function addUserMessage(text) {
        addMessage('user', text);
    }

    function addAgentMessage(text) {
        addMessage('agent', text);
    }

    function addSystemMessage(text) {
        addMessage('system', text);
    }

    function addErrorMessage(text) {
        addMessage('error', text);
    }

    function addMessage(type, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.innerHTML = `<p>${escapeHtml(text)}</p>`;
        elements.chatMessages.appendChild(messageDiv);
        elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        return messageDiv; // Return element for potential removal
    }

    // Utility functions
    function showError(message) {
        addErrorMessage(message);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
